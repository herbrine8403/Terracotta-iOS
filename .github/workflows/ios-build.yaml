name: iOS Build and Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ios/**'
      - 'src/**'
      - 'Cargo.toml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ios/**'
      - 'src/**'
      - 'Cargo.toml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: false
        type: string

env:
  DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
  CODE_SIGN_IDENTITY: ${{ secrets.APPLE_CODE_SIGN_IDENTITY }}
  PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim
    
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Cache Swift Package Manager
      uses: actions/cache@v4
      with:
        path: ios/.build
        key: ${{ runner.os }}-spm-${{ hashFiles('ios/Package.swift') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    
    - name: Cache iOS Build Artifacts
      uses: actions/cache@v4
      with:
        path: ios/build
        key: ${{ runner.os }}-ios-build-${{ hashFiles('ios/**/*.{swift,h,c,m,plist}') }}
        restore-keys: |
          ${{ runner.os }}-ios-build-
    
        - name: Install iOS targets
          run: |
            rustup target add aarch64-apple-ios
            rustup target add x86_64-apple-ios
            rustup target add aarch64-apple-ios-sim
    
        - name: Install cargo tools
          run: |
            cargo install cargo-lipo --version 3.6.0
            cargo install cbindgen --version 0.26.0
    
        - name: Setup build environment      run: |
        cd ios
        chmod +x Scripts/setup.sh
        ./Scripts/setup.sh tools
    
    - name: Download ZeroTier framework
      run: |
        cd ios
        chmod +x Scripts/build.sh
        ./Scripts/build.sh framework
      continue-on-error: true  # ZeroTier framework is optional, build can continue without it
    
    - name: Build Rust core library
      run: |
        cd ios
        ./Scripts/build.sh core
    
    - name: Generate C bindings
      run: |
        # Create a basic cbindgen.toml in the project root if it doesn't exist
        if [ ! -f "cbindgen.toml" ]; then
          echo 'language = "C"' > cbindgen.toml
          echo 'include_version = false' >> cbindgen.toml
          echo '[parse]' >> cbindgen.toml
          echo 'parse_deps = false' >> cbindgen.toml
          echo 'include = ["src/lib.rs"]' >> cbindgen.toml
          echo '[export]' >> cbindgen.toml
          echo 'item_types = ["functions", "types", "globals"]' >> cbindgen.toml
        fi
        # Generate bindings for the terracotta crate (not terracotta_core which doesn't exist)
        cbindgen --config cbindgen.toml --crate terracotta -o ios/Sources/TerracottaCore/Native/terracotta_generated.h || echo "cbindgen failed but continuing"
    
    - name: Create Xcode project
      run: |
        cd ios
        swift package generate-xcodeproj
    
    - name: Build iOS Framework
      run: |
        cd ios
        xcodebuild -project Terracotta.xcodeproj \
                   -scheme TerracottaCore \
                   -configuration Release \
                   -destination 'generic/platform=iOS' \
                   build
    
    - name: Upload Framework Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: terracotta-ios-framework
        path: ios/build/Release-iphoneos/

  test-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install cargo tools
      run: |
        cargo install cargo-lipo --version 4.0.0
        cargo install cbindgen --version 0.26.0
    
    - name: Run iOS Tests
      run: |
        cd ios
        xcodebuild test \
                   -project Terracotta.xcodeproj \
                   -scheme Terracotta \
                   -destination 'platform=iOS Simulator,name=iPhone 14,OS=latest' \
                   -enableCodeCoverage YES
    
    - name: Generate code coverage report
      run: |
        cd ios
        xcrun xccov view --report --json build/Logs/Test/*.xcresult > coverage.json || echo "No coverage generated"
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ios/coverage.json
        flags: ios
        name: ios-coverage

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Run cargo audit
      run: |
        cargo install cargo-audit
        cargo audit || echo "Security audit completed with warnings"
    
    - name: Run SwiftLint
      run: |
        cd ios
        if command -v swiftlint &> /dev/null; then
          swiftlint --strict
        else
          echo "SwiftLint not installed"
          # Install SwiftLint if not available
          brew install swiftlint
          swiftlint --strict
        fi

  create-release:
    runs-on: ubuntu-latest
    needs: [build-ios]
    if: github.event.inputs.version != ''
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Download IPA artifacts
      uses: actions/download-artifact@v4
      with:
        name: terracotta-ios-app
        path: ios/build
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: "Terracotta iOS v${{ github.event.inputs.version }}"
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          ios/build/*.ipa
          ios/build/*.dSYM.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}