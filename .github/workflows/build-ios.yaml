name: Build iOS Terracotta

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ios/**'
      - 'src/**'
      - 'Cargo.toml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ios/**'
      - 'src/**'
      - 'Cargo.toml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: false
        type: string

env:
  DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
  CODE_SIGN_IDENTITY: ${{ secrets.APPLE_CODE_SIGN_IDENTITY }}
  PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Setup Swift Package Manager
      run: |
        cd ios
        swift package generate-xcodeproj
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim
    
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Cache Swift Package Manager
      uses: actions/cache@v4
      with:
        path: ios/.build
        key: ${{ runner.os }}-spm-${{ hashFiles('ios/Package.swift') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    
    - name: Install iOS targets
      run: |
        rustup target add aarch64-apple-ios
        rustup target add x86_64-apple-ios
        rustup target add aarch64-apple-ios-sim
    
    - name: Install cargo tools
      run: |
        cargo install cargo-lipo
        cargo install cbindgen
    
    - name: Download ZeroTier framework
      run: |
        cd ios
        chmod +x Scripts/build.sh
        ./Scripts/build.sh framework
    
    - name: Build Rust core library
      run: |
        cd ios
        ./Scripts/build.sh core
    
    - name: Generate C bindings
      run: |
        cd ios
        cbindgen --config cbindgen.toml --crate terracotta_core --output Sources/TerracottaCore/Native/terracotta_generated.h
    
    - name: Build iOS app (Device)
      run: |
        cd ios
        xcodebuild -project Terracotta.xcodeproj \
                   -scheme Terracotta \
                   -configuration Release \
                   -destination 'generic/platform=iOS' \
                   -archivePath $PWD/build/Terracotta.xcarchive \
                   archive \
                   CODE_SIGN_STYLE=Manual \
                   PROVISIONING_PROFILE_SPECIFIER="${{ env.PROVISIONING_PROFILE }}" \
                   CODE_SIGN_IDENTITY="${{ env.CODE_SIGN_IDENTITY }}" \
                   DEVELOPMENT_TEAM="${{ env.DEVELOPMENT_TEAM }}"
    
    - name: Build iOS app (Simulator)
      run: |
        cd ios
        xcodebuild -project Terracotta.xcodeproj \
                   -scheme Terracotta \
                   -configuration Release \
                   -destination 'platform=iOS Simulator,name=iPhone 14,OS=latest' \
                   build
    
    - name: Run tests
      run: |
        cd ios
        xcodebuild test \
                   -project Terracotta.xcodeproj \
                   -scheme Terracotta \
                   -destination 'platform=iOS Simulator,name=iPhone 14,OS=latest' \
                   -enableCodeCoverage YES
    
    - name: Generate code coverage report
      run: |
        cd ios
        xcrun xccov view --report --json DerivedData/Logs/Test/*.xcresult > coverage.json
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ios/coverage.json
        flags: ios
        name: ios-coverage
    
    - name: Export IPA
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        cd ios
        xcodebuild -exportArchive \
                   -archivePath $PWD/build/Terracotta.xcarchive \
                   -exportPath $PWD/build \
                   -exportOptionsPlist ExportOptions.plist
    
    - name: Upload build artifacts
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: terracotta-ios
        path: ios/build/*.ipa
    
    - name: Create Release
      if: github.event.inputs.version != ''
      run: |
        VERSION="${{ github.event.inputs.version }}"
        gh release create "v$VERSION" \
          --title "Terracotta iOS v$VERSION" \
          --generate-notes \
          ios/build/*.ipa
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-ui:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Setup Swift Package Manager
      run: |
        cd ios
        swift package generate-xcodeproj
    
    - name: Run UI Tests
      run: |
        cd ios
        xcodebuild test \
                   -project Terracotta.xcodeproj \
                   -scheme TerracottaUITests \
                   -destination 'platform=iOS Simulator,name=iPhone 14,OS=latest'

  security-scan:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Run cargo audit
      run: |
        cargo install cargo-audit
        cargo audit
    
    - name: Run SwiftLint
      run: |
        cd ios
        if command -v swiftlint &> /dev/null; then
          swiftlint --strict
        else
          echo "SwiftLint not installed"
        fi

  deploy-testflight:
    runs-on: macos-latest
    needs: [build-ios, test-ui]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: terracotta-ios
        path: ios/build
    
    - name: Upload to TestFlight
      run: |
        xcrun altool --upload-app \
                     --type ios \
                     --file ios/build/*.ipa \
                     --username "${{ secrets.APPLE_ID }}" \
                     --password "${{ secrets.APPLE_APP_PASSWORD }}"
    
    - name: Notify Slack
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        channel: '#terracotta-releases'
        text: '🎉 Terracotta iOS build successful and uploaded to TestFlight!'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}